<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário de Aulas</title>
    <style>
        /* ==========================================================================
           1. ESTILOS CSS (Mantidos inalterados)
           ========================================================================== */
        :root {
            --cor-fundo-pagina: #f0f2f5; 
            --cor-azul-marinho: #1248a7;   
            --cor-verde-lima: #B5DB3E;     
            --cor-laranja-destaque: #E84E0F; 
            --cor-texto-escuro: #303030;
            --cor-texto-cinza: #666666;
            --cor-vermelho-live: #ff0000;
            --cor-cinza-encerrado: #e0e0e0;
            --borda-suave: 1px solid rgba(0,0,0,0.08); 
            --sombra-card: 0 4px 20px rgba(0,0,0,0.08); 
            --borda-raio: 15px;
            --borda-raio-btn: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            background-color: var(--cor-fundo-pagina); 
            padding: 25px;
            color: var(--cor-texto-escuro);
            -webkit-font-smoothing: antialiased;
        }

        .container-disciplina { max-width: 1000px; margin: 0 auto; width: 100%; }

        /* CABEÇALHO */
        .disciplina-header {
            background-color: var(--cor-azul-marinho);
            padding: 30px 20px; 
            border-radius: var(--borda-raio) var(--borda-raio) 0 0;
            border-bottom: 6px solid var(--cor-verde-lima); 
            margin-bottom: 30px;
            display: flex; align-items: center; justify-content: center; 
            position: relative; 
            box-shadow: var(--sombra-card);
        }
        
        .botao-voltar {
            position: absolute; left: 25px; 
            color: white !important; 
            text-decoration: none !important;
            font-weight: 600; 
            background-color: rgba(255,255,255,0.15);
            padding: 8px 18px; 
            border-radius: var(--borda-raio-btn);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 13px; text-transform: uppercase;
            transition: 0.3s;
            z-index: 10;
        }
        
        .botao-voltar:hover { 
            background-color: white; 
            color: var(--cor-azul-marinho) !important; 
        }

        .disciplina-header h1 { 
            font-size: 22px; color: white; font-weight: 650; 
            text-align: center; text-transform: uppercase; letter-spacing: 1px;
            line-height: 1.3;
        }

        /* CONTAINER PRINCIPAL E BOTÕES */
        .main-content-wrapper { margin-bottom: 30px; }

        .titulo-secao-topo {
            text-align: center; color: var(--cor-texto-escuro);
            font-size: 20px; font-weight: 600; margin-bottom: 25px;
            margin-top: 10px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
            display: inline-block;
        }
        
        .wrapper-titulo { text-align: center; margin-bottom: 20px; }

        .aviso-botoes {
            text-align: center;
            font-size: 14px;
            color: var(--cor-texto-cinza);
            margin-top: 10px;
            margin-bottom: 15px;
            padding: 0 10px;
        }
        
        .aviso-botoes strong { color: var(--cor-azul-marinho); font-weight: 700; }

        .container-botoes-acesso {
            display: flex;
            justify-content: center; 
            gap: 20px; 
            margin-bottom: 40px; 
            width: 100%;
        }

        .btn-acesso-extra {
            flex: 1; 
            max-width: 350px; 
            padding: 15px 25px;
            text-align: center;
            border-radius: var(--borda-raio-btn);
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none !important;
            color: white !important;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
        }

        .btn-aovivo-destaque {
            background-color: var(--cor-laranja-destaque);
            border: 2px solid var(--cor-laranja-destaque);
        }

        .btn-webcoord-destaque {
            background-color: var(--cor-azul-marinho);
            border: 2px solid var(--cor-azul-marinho);
        }

        .btn-acesso-extra:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
            filter: brightness(1.1); 
        }

        /* GRID DE CARDS */
        .container-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 100%;
            margin-bottom: 40px;
        }

        .card-aula {
            background: white;
            border-radius: var(--borda-raio);
            border: var(--borda-suave);
            box-shadow: var(--sombra-card);
            padding: 0; 
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            border-top: 5px solid var(--cor-verde-lima); 
            transition: all 0.3s ease;
            position: relative;
        }

        .card-aula:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.12);
        }

        /* Título do Card */
        .card-header {
            background-color: #f8f9fa;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #eaeaea;
            position: relative; 
        }

        .card-header h3 {
            color: var(--cor-azul-marinho);
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* --- ESTILOS DE STATUS --- */
        .badge-live {
            position: absolute;
            top: 10px; right: 10px;
            background-color: var(--cor-vermelho-live);
            color: white;
            font-size: 9px; padding: 4px 8px;
            border-radius: 10px; font-weight: 800;
            text-transform: uppercase;
            animation: piscarBadge 1.5s infinite;
            z-index: 5;
            display: none; 
        }

        .card-aula.status-live {
            border: 2px solid var(--cor-vermelho-live);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
            animation: pulsarBorda 2s infinite;
        }
        .card-aula.status-live .badge-live { display: block; }
        .card-aula.status-live .card-header h3 { color: var(--cor-vermelho-live); }

        .card-aula.status-encerrada {
            opacity: 0.7;
            border-top-color: #ccc;
        }
        .card-aula.status-encerrada:hover { opacity: 1; }
        .card-aula.status-encerrada .card-header::before {
            content: '✔ Encerrada';
            display: block;
            font-size: 9px; color: #888;
            font-weight: bold; text-transform: uppercase;
            margin-bottom: 3px;
        }

        @keyframes pulsarBorda {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.4); }
            0% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        @keyframes piscarBadge {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Corpo do Card */
        .card-body {
            padding: 20px;
            flex: 1; 
            display: flex; flex-direction: column;
            gap: 15px;
        }

        .card-info-row {
            display: flex; align-items: center;
            gap: 12px; padding-bottom: 12px;
            border-bottom: 1px dashed #eee;
        }
        .card-info-row:last-child { border-bottom: none; padding-bottom: 0; }

        .icon-circle {
            width: 36px; height: 36px;
            border-radius: 50%;
            background-color: rgba(18, 72, 167, 0.08); 
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .icon-circle svg { width: 18px; height: 18px; fill: var(--cor-azul-marinho); }

        .info-content { display: flex; flex-direction: column; text-align: left; }
        .info-label {
            font-size: 10px; text-transform: uppercase;
            color: #888; font-weight: 700;
            margin-bottom: 2px; letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 13px; color: #333;
            font-weight: 600; line-height: 1.3;
        }

        /* Botão de Gravação */
        .card-footer {
            padding: 15px 20px;
            background-color: white;
            border-top: 1px solid #f0f0f0;
        }

        .btn-gravacao-card {
            display: flex; align-items: center; justify-content: center;
            padding: 12px 0;
            background-color: var(--cor-laranja-destaque);
            color: white !important; 
            text-decoration: none !important;
            font-size: 12px; font-weight: 800;
            border-radius: 8px; 
            text-transform: uppercase; 
            transition: 0.2s; 
            width: 100%;
            gap: 8px;
        }
        .btn-gravacao-card:hover { 
            background-color: #B5DB3E; 
            color: rgb(0, 0, 0) !important; 
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .spacer-footer { height: 10px; }

        /* Estilo específico para cards de Webcoord (Borda Azul) */
        .card-webcoord { border-top-color: var(--cor-laranja-destaque); }
        .card-webcoord .btn-gravacao-card { background-color: var(--cor-azul-marinho); }
        .card-webcoord .btn-gravacao-card:hover { background-color: var(--cor-laranja-destaque); }

        /* RESPONSIVIDADE */
        @media (max-width: 900px) {
            .container-cards { grid-template-columns: repeat(2, 1fr); } 
        }

        @media (max-width: 600px) { 
            .container-cards { grid-template-columns: 1fr; } 
            .disciplina-header h1 { font-size: 8px; }

            
            body { padding: 15px; }
            .disciplina-header { flex-direction: column; gap: 15px; padding: 20px; text-align: center; }
            .botao-voltar { position: static; align-self: center; margin-bottom: 5px; width: 100%; text-align: center; display: block; }
            .disciplina-header h1 { font-size: 18px; max-width: 100%; }
            .container-botoes-acesso { flex-direction: column; align-items: center; }
            .btn-acesso-extra { width: 100%; max-width: 100%; }

            /* --- ESTILOS DE EXPANSÃO (APENAS MOBILE) --- */
            .card-body, .card-footer, .spacer-footer { display: none; }
            .card-aula.expandido .card-body { display: flex; }
            .card-aula.expandido .card-footer, .card-aula.expandido .spacer-footer { display: block; }

            .card-header {
                cursor: pointer;
                display: flex; justify-content: center; align-items: center;
            }
            .disciplina-header h1 { font-size: 12px; } 

            .card-header::after {
                content: '▼';
                font-size: 0.8em; color: var(--cor-laranja-destaque);
                position: absolute; right: 20px;
                transition: transform 0.3s ease;
            }
            .card-aula.expandido .card-header::after { transform: rotate(180deg); }
            .card-aula:hover { transform: none; box-shadow: var(--sombra-card); }
        }

        @media (max-width: 400px) { .disciplina-header h1 { font-size: 16px; } }
    </style>
</head>
<body>

<div class="container-disciplina">
    
    <header class="disciplina-header">
        <!-- <a id="link-voltar" href="#" class="botao-voltar"> Voltar</a> -->
        <div style="display: flex; flex-direction: column; align-items: center;">
            <h1 id="titulo-disciplina">NOME DA DISCIPLINA</h1>
        </div>
    </header>

    <div class="aviso-botoes">
        ℹ️ Utilize o botão <strong>"ACESSO AULA AO VIVO"</strong> abaixo para participar das aulas <B>ABAIXO.</B>
    </div>

    <div class="container-botoes-acesso">
        <a id="link-zoom" href="#" target="_blank" class="btn-acesso-extra btn-aovivo-destaque">
            🔴 Acesso Aula ao Vivo
        </a>
        
        <a id="link-webcoord" href="#" target="_blank" class="btn-acesso-extra btn-webcoord-destaque">
            👩‍🏫 Webcoordenação
        </a>
    </div>

    <div class="main-content-wrapper">
        <div class="wrapper-titulo">
            <div class="titulo-secao-topo">AULAS AO VIVO</div>
        </div>
        <div class="container-cards" id="container-cards-aulas"></div>
        
        <div id="secao-webcoord" style="display: none;">
            <div class="wrapper-titulo">
                <div class="titulo-secao-topo" style="color: var(--cor-azul-marinho);">WEBCOORDENAÇÃO</div>
            </div>
            <div class="container-cards" id="container-cards-webcoord"></div>
        </div>
    </div>

</div>

<script>
    /* ==========================================================================
       === 1. ÁREA DE CONFIGURAÇÃO MANUAL (INJEÇÃO PYTHON AQUI) ===
       ========================================================================== */
    
    // Configurações Gerais da Página
    const CONFIG_GERAL = {
        nomeDisciplina: "Meio Ambiente e Sustentabilidade",
        linkVoltar: "https://digital.unisa.br/course/view.php?id=33648",
        linkZoom: "https://us02web.zoom.us/j/82556824720?pwd=m54bB0cBQFyfu00PpTceKXRvC4hXyd.1",
        linkWebcoord: "#", 
        professorPadrao: "Guilherme José",
        horaPadrao: "19:00"
    };

    const INPUT_AULAS = [
        
        { 
            Card: 1, 
            data: "10/02", 
            hora: "", 
            prof: "", 
            link: "https://us02web.zoom.us/rec/share/TJ68x2vGGhCMGexQC57bJPhVTCBOvf-9orQQUh6s_Ov561c7yxwP8ejymEdzf0CZ.kcuiUl0HUoJYXyHP" 
        },
        { 
            Card: 2, 
            data: "27/02", 
            hora: "", 
            prof: "", 
            link: "https://us02web.zoom.us/rec/share/FHqq2J55p41wLj1nG3yic5FF3cBhcHR9htLZYeY12To3WfAdY1YIOtN2-elc2bi3.abVRFZNrMtsipyEN" 
        },
        { 
            Card: 3, 
            data: "03/03", 
            hora: "", 
            prof: "", 
            link: "" 
        },
        { 
            Card: 4, 
            data: "10/03", 
            hora: "", 
            prof: "", 
            link: "" 
        },
        { 
            Card: 5, 
            data: "17/03", 
            hora: "", 
            prof: "", 
            link: "" 
        },
        { 
            Card: 6, 
            data: "24/03", 
            hora: "", 
            prof: "", 
            link: "" 
        },
    ];

    const INPUT_WEBCOORD = [
        
    ];

    /* ==========================================================================
       === 2. LÓGICA DO SISTEMA (NÃO PRECISA EDITAR ABAIXO) ===
       ========================================================================== */
    
    // Processa a lista do usuário filtrando dados vazios e organizando campos
    function processarDados(listaInput) {
        if (!listaInput) return [];
        return listaInput
            // Filtro rigoroso: Ignora cards que não possuam Data preenchida
            .filter(item => item.data && item.data.trim() !== "")
            .map(item => ({
                numero: item.Card,
                data: item.data,
                hora: item.hora && item.hora !== "" ? item.hora : CONFIG_GERAL.horaPadrao,
                professor: item.prof && item.prof !== "" ? item.prof : CONFIG_GERAL.professorPadrao,
                linkGravacao: item.link
            }));
    }

    const DADOS_AULAS = processarDados(INPUT_AULAS);
    const DADOS_WEBCOORD = processarDados(INPUT_WEBCOORD);

    const ICONS = {
        calendar: `<svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM9 14H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2zm-8 4H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"/></svg>`,
        clock: `<svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>`,
        user: `<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`
    };

    function parseDate(dataStr, horaStr) {
        if (!dataStr || !horaStr) return null;
        const partesData = dataStr.split('/');
        const dia = parseInt(partesData[0]);
        const mes = parseInt(partesData[1]) - 1;
        const ano = new Date().getFullYear();
        let horaLimpa = horaStr.split('às')[0].trim().replace('h', ':');
        const partesHora = horaLimpa.split(':');
        const horas = parseInt(partesHora[0]);
        const minutos = parseInt(partesHora[1] || 0);
        return new Date(ano, mes, dia, horas, minutos);
    }

    function getStatusAula(dataStr, horaStr) {
        try {
            const inicio = parseDate(dataStr, horaStr);
            if (!inicio) return 'normal';
            const agora = new Date();
            const fim = new Date(inicio.getTime() + 60 * 60 * 1000); 
            if (agora >= inicio && agora <= fim) return 'live';
            else if (agora > fim) return 'encerrada';
            return 'normal';
        } catch (e) {
            console.error("Erro data", e);
            return 'normal';
        }
    }

    // Função genérica para criar cards
    function criarCard(aula, container, isWebcoord = false) {
        const card = document.createElement('div');
        
        const status = getStatusAula(aula.data, aula.hora);
        let classeExtra = '';
        if (status === 'live') classeExtra = 'status-live';
        if (status === 'encerrada') classeExtra = 'status-encerrada';
        if (isWebcoord) classeExtra += ' card-webcoord'; 

        card.className = `card-aula ${classeExtra}`;
        
        let footerHTML = `<div class="spacer-footer"></div>`;
        
        // Verifica se há um link real inserido (ignora vazios, nulos, undefined ou '#')
        if (aula.linkGravacao && aula.linkGravacao.trim() !== "" && aula.linkGravacao.trim() !== "#" && String(aula.linkGravacao).toLowerCase() !== "undefined") {
            footerHTML = `
                <div class="card-footer">
                    <a href="${aula.linkGravacao}" target="_blank" class="btn-gravacao-card" title="Acessar Gravação">
                        <svg style="width:16px; height:16px; fill:currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        Ver Gravação
                    </a>
                </div>
            `;
        }
        
        card.innerHTML = `
            <div class="card-header">
                <span class="badge-live">AO VIVO 🔴</span>
                <h3>Aula ${aula.numero}</h3>
            </div>
            
            <div class="card-body">
                <div class="card-info-row">
                    <div class="icon-circle">${ICONS.calendar}</div>
                    <div class="info-content">
                        <span class="info-label">Data</span>
                        <span class="info-value">${aula.data}</span>
                    </div>
                </div>
                <div class="card-info-row">
                    <div class="icon-circle">${ICONS.clock}</div>
                    <div class="info-content">
                        <span class="info-label">Horário</span>
                        <span class="info-value">${aula.hora}</span>
                    </div>
                </div>
                <div class="card-info-row">
                    <div class="icon-circle">${ICONS.user}</div>
                    <div class="info-content">
                        <span class="info-label">Professor(a)</span>
                        <span class="info-value">${aula.professor}</span>
                    </div>
                </div>
            </div>
            ${footerHTML}
        `;

        const header = card.querySelector('.card-header');
        header.addEventListener('click', () => {
            if (window.innerWidth <= 600) {
                card.classList.toggle('expandido');
            }
        });
        
        container.appendChild(card);
    }

    function renderizarPagina() {
        document.getElementById('titulo-disciplina').innerText = CONFIG_GERAL.nomeDisciplina;
        document.getElementById('link-voltar').href = CONFIG_GERAL.linkVoltar;
        
        // Tratamento Botão Zoom
        const btnZoom = document.getElementById('link-zoom');
        if (CONFIG_GERAL.linkZoom && CONFIG_GERAL.linkZoom.trim() !== "" && CONFIG_GERAL.linkZoom.trim() !== "#") {
            btnZoom.href = CONFIG_GERAL.linkZoom;
            btnZoom.style.display = 'flex';
        } else {
            btnZoom.style.display = 'none';
        }
        
        // Tratamento Botão Webcoordenação
        const btnWeb = document.getElementById('link-webcoord');
        if (CONFIG_GERAL.linkWebcoord && CONFIG_GERAL.linkWebcoord.trim() !== "" && CONFIG_GERAL.linkWebcoord.trim() !== "#") {
            btnWeb.href = CONFIG_GERAL.linkWebcoord;
            btnWeb.style.display = 'flex';
        } else {
            btnWeb.style.display = 'none';
        }

        const containerAulas = document.getElementById('container-cards-aulas');
        containerAulas.innerHTML = '';

        const secaoWeb = document.getElementById('secao-webcoord');
        const containerWeb = document.getElementById('container-cards-webcoord');
        containerWeb.innerHTML = '';
        
        let qtdWebcoord = 0;

        // Distribui os cards interceptando aulas marcadas como "Webcoordenação"
        DADOS_AULAS.forEach(aula => {
            // Checa todas as informações do card (professor, dados) em busca do termo
            const conteudoAula = Object.values(aula).join(" ").toLowerCase();
            const isWebcoord = conteudoAula.includes("webcoord");
            
            if (isWebcoord) {
                criarCard(aula, containerWeb, true);
                qtdWebcoord++;
            } else {
                criarCard(aula, containerAulas, false);
            }
        });

        // Adiciona itens passados explicitamente no array de Webcoord (se houver)
        if (DADOS_WEBCOORD && DADOS_WEBCOORD.length > 0) {
            DADOS_WEBCOORD.forEach(aula => {
                criarCard(aula, containerWeb, true);
                qtdWebcoord++;
            });
        }
        
        // Só mostra a seção azul se houver pelo menos um card nela
        if (qtdWebcoord > 0) {
            secaoWeb.style.display = 'block'; 
        } else {
            secaoWeb.style.display = 'none'; 
        }
    }

    document.addEventListener('DOMContentLoaded', renderizarPagina);

</script>
</body>

</html>
